PLG_CONTENT_PHOCAGALLERYSLIDESHOW_DESCRIPTION="<div class='alert alert-info left' style='text-align:left;'><p><h1><strong>Phoca Gallery Slideshow Plugin</strong></h1><br />Zeigt in Beiträgen eine responsive Slideshow mit Bildern aus einer ausgewählten Phoca-Gallery-Kategorie an.<br /><br />{pgslideshow id=...|width=...|height=...|delay=...|image=...|pgslink=...|desc=...}<br />Bildgrössen: O = Original, L = Gross, M = Mittel, S = Klein<br /><br /><h3>Beispiel: {pgslideshow id=1|width=900|height=500|delay=3000|image=O}</h3></p><p><strong>Funktionen</strong><br />• Kompatibel mit Joomla 4 / 5 / 6<br />• Responsiv (automatische Skalierung auf mobilen Geräten)<br />• Fade-Übergang<br />• Automatisches Pausieren bei Mauskontakt<br />• Touch-Wischgesten (Mobilgeräte)<br />• Maus-Drag-Navigation (Desktop)<br />• Lazy Loading der Bilder</p><h2>WICHTIG: Aktivieren und veröffentlichen Sie dieses Plugin im <a style='text-decoration: underline' href='index.php?option=com_installer&view=manage&filter[search]=Phoca%20Gallery'>Plugin Manager</a>!</h2><p>Weitere Informationen:<br /><a href='https://www.phoca.cz' target='_blank' rel='noopener'>https://www.phoca.cz</a><br /><a href='https://www.phoca.cz/documentation' target='_blank' rel='noopener'>https://www.phoca.cz/documentation</a><br /><a href='https://www.phoca.cz/forum' target='_blank' rel='noopener'>https://www.phoca.cz/forum</a></p></div>"