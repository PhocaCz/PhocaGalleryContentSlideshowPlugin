PLG_CONTENT_PHOCAGALLERYSLIDESHOW_DESCRIPTION="<div class='alert alert-info left' style='text-align:left;'><p><h1>Phoca Gallery Slideshow Plugin</h1><br />Displays a responsive slideshow of images from a selected Phoca Gallery category in articles.<br /><br />{pgslideshow id=...|width=...|height=...|delay=...|image=...|pgslink=...|desc=...}<br />Image sizes: O = original, L = large, M = medium, S = small<br /><br /><h3>Example: {pgslideshow id=1|width=900|height=500|delay=3000|image=O}</h3></p><p><strong>Features</strong><br />• Joomla 4 / 5 / 6 compatible<br />• Responsive (auto scales on mobile)<br />• Fade transition<br />• Autopause on hover<br />• Touch swipe support<br />• Mouse drag navigation<br />• Lazy loading</p><h2>IMPORTANT: Enable and publish this plugin in the <a style='text-decoration: underline' href='index.php?option=com_installer&view=manage&filter[search]=Phoca%20Gallery'>Plugin Manager</a>!</h2><p>More information:<br /><a href='https://www.phoca.cz' target='_blank' rel='noopener'>https://www.phoca.cz</a><br /><a href='https://www.phoca.cz/documentation' target='_blank' rel='noopener'>https://www.phoca.cz/documentation</a><br /><a href='https://www.phoca.cz/forum' target='_blank' rel='noopener'>https://www.phoca.cz/forum</a></p></div>"